*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{

.header{

}
.header::after{

  height:30px;background:#f0f4ff;border-radius:30px 30px 0 0;
}
.header h1{font-size:26px;font-weight:800;margin-bottom:6px}
.header p{font-size:14px;opacity:.85;max-width:500px;margin:0 auto}
.header-meta{margin-top:10px;font-size:13px;opacity:.8}

.main-wrap{max-width:860px;margin:0 auto;padding:0 16px 80px}

.search-bar{
  margin-top:-40px;position:relative;z-index:2;
  display:flex;gap:8px;margin-bottom:14px;
}
.search-bar input{
  flex:1;padding:12px 16px;border:none;border-radius:12px;
  font-size:16px;box-shadow:0 4px 20px rgba(0,0,0,.1);
  outline:none;background:#fff;
}
.search-bar input:focus{box-shadow:0 4px 20px rgba(30,64,175,.15)}

.filters{
  display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;
}
.filter-chip{
  padding:6px 14px;border-radius:20px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;
  background:#e2e8f0;color:#475569;transition:all .2s;
}
.filter-chip:hover{background:#cbd5e1}
.filter-chip.active{background:#1e40af;color:#fff}

.video-count{font-size:13px;color:#94a3b8;margin-bottom:10px}

.video-grid{display:grid;gap:14px}
.video-card{
  background:#fff;border-radius:16px;overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  display:flex;gap:14px;padding:12px;
  transition:all .2s;cursor:pointer;text-decoration:none;color:inherit;
}
.video-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.1);transform:translateY(-2px)}
.video-thumb{
  width:180px;min-height:100px;border-radius:10px;
  background-size:cover;background-position:center;flex-shrink:0;
}
.video-info{flex:1;min-width:0}
.video-title{font-size:16px;font-weight:700;margin-bottom:4px;line-height:1.3}
.video-meta{font-size:12px;color:#94a3b8;display:flex;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.video-summary{font-size:13px;color:#64748b;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.video-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.tag{
  padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;
}
.tag-nature{background:#d1fae5;color:#065f46}
.tag-city{background:#dbeafe;color:#1e40af}
.tag-culture{background:#fef3c7;color:#92400e}
.tag-tips{background:#f3e8ff;color:#6b21a8}

.footer{text-align:center;padding:30px 16px;font-size:13px;color:#94a3b8}
.footer a{color:#3b82f6;text-decoration:none}

@media(max-width:480px){
  .header h1{font-size:20px}
  .video-card{flex-direction:column;gap:10px}
  .video-thumb{width:100%;height:180px}
}

var currentFilter = 'all';

function setFilter(f){
  currentFilter = f;
  var chips = document.querySelectorAll('.filter-chip');
  for(var i=0;i<chips.length;i++){
    chips[i].className = 'filter-chip' + (chips[i].getAttribute('data-filter') === f ? ' active' : '');
  }
  doFilter();
}

function doFilter(){
  var q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  var filtered = [];
  for(var i=0;i<VIDEOS.length;i++){
    var v = VIDEOS[i];
    if(currentFilter !== 'all' && v.category !== currentFilter) continue;
    if(q && v.title.toLowerCase().indexOf(q) === -1 && (v.country || '').indexOf(q) === -1 && v.summary.toLowerCase().indexOf(q) === -1) continue;
    filtered.push(v);
  }

  document.getElementById('videoCount').textContent = '📺 共 ' + filtered.length + ' 部影片';

  var c = document.getElementById('videoGrid');
  var h = '';
  for(var i=0;i<filtered.length;i++){
    var v = filtered[i];
    var tags = '';
    for(var j=0;j<v.tags.length;j++){
      tags += '<span class="tag tag-' + v.category + '">#' + v.tags[j] + '</span>';
    }
    var catName = {'nature':'自然奇景','city':'城市探索','culture':'文化體驗','tips':'旅遊技巧'};
    h += '<a class="video-card" href="video/" + v.page + ".html">';
    h += '<div class="video-thumb" style="background-image:url(https://img.youtube.com/vi/' + v.video_id + '/mqdefault.jpg)"></div>';
    h += '<div class="video-info">';
    h += '<div class="video-title">' + v.title + '</div>';
    h += '<div class="video-meta"><span>⏱️ ' + v.duration + '</span><span>🌍 ' + v.country + '</span><span>👁️ ' + v.views.toLocaleString() + '</span><span>📅 ' + v.date + '</span></div>';
    h += '<div class="video-summary">' + v.summary + '</div>';
    h += '<div class="video-tags">' + tags + '</div>';
    h += '</div></a>';
  }
  if(filtered.length === 0){
    h = '<div style="text-align:center;padding:40px;color:#94a3b8;font-size:15px">🔍 沒有符合的影片</div>';
  }
  c.innerHTML = h;
}
